<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FJT-TECH Portal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #030712;
      color: #f9fafb;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    header {
      background: #0f172a;
      border-bottom: 1px solid #1e293b;
      padding: 0 24px;
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .header-inner {
      max-width: 1280px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
    }
    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
      text-decoration: none;
      color: #fff;
    }
    .logo-icon {
      width: 36px;
      height: 36px;
      background: rgba(255,255,255,0.1);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 14px;
    }
    .logo-text {
      font-weight: 600;
      font-size: 18px;
    }
    .logo-sub {
      font-size: 12px;
      color: #94a3b8;
    }
    nav { display: flex; gap: 8px; }
    nav a {
      color: #94a3b8;
      text-decoration: none;
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.2s;
    }
    nav a:hover, nav a.active {
      color: #fff;
      background: rgba(255,255,255,0.05);
    }
    nav a.active {
      color: #60a5fa;
      background: rgba(96,165,250,0.1);
    }

    /* Main Content */
    main { flex: 1; }

    .section-header {
      text-align: center;
      padding: 48px 24px 24px;
    }
    .section-header h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .section-header p {
      color: #9ca3af;
      font-size: 1rem;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(59,130,246,0.15);
      border: 1px solid rgba(59,130,246,0.3);
      border-radius: 9999px;
      padding: 6px 16px;
      margin-bottom: 16px;
      font-size: 14px;
      color: #93c5fd;
    }
    .badge-dot {
      width: 8px;
      height: 8px;
      background: #60a5fa;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    /* Iframe Container */
    .iframe-section {
      padding: 0 24px 48px;
    }
    .iframe-wrapper {
      max-width: 1280px;
      margin: 0 auto;
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3), 0 2px 4px -2px rgba(0,0,0,0.3);
    }
    .iframe-header {
      padding: 16px 24px;
      border-bottom: 1px solid #1f2937;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .iframe-header-icon {
      width: 32px;
      height: 32px;
      background: rgba(59,130,246,0.15);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .iframe-header-icon svg {
      width: 18px;
      height: 18px;
      color: #60a5fa;
    }
    .iframe-header-text h3 {
      font-size: 14px;
      font-weight: 600;
    }
    .iframe-header-text p {
      font-size: 12px;
      color: #6b7280;
    }

    /* Footer */
    footer {
      background: #0f172a;
      border-top: 1px solid #1e293b;
      padding: 24px;
      text-align: center;
      color: #6b7280;
      font-size: 13px;
    }

    /* Responsive */
    @media (max-width: 640px) {
      .header-inner { padding: 0; }
      nav { display: none; }
      .section-header h1 { font-size: 1.5rem; }
      .iframe-section { padding: 0 12px 32px; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <div class="header-inner">
      <a href="/" class="logo">
        <div class="logo-icon">FJT</div>
        <div>
          <div class="logo-text">FJT-TECH</div>
          <div class="logo-sub">Portal</div>
        </div>
      </a>
      <nav>
        <a href="#scheduler" class="active">Personal Scheduler</a>
      </nav>
    </div>
  </header>

  <!-- Main -->
  <main>
    <div class="section-header">
      <div class="badge">
        <span class="badge-dot"></span>
        FJT-TECH Tools
      </div>
      <h1>Personal Scheduler</h1>
      <p>Schedule and manage your appointments</p>
    </div>

    <div class="iframe-section" id="scheduler">
      <div class="iframe-wrapper">
        <div class="iframe-header">
          <div class="iframe-header-icon">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 012.25-2.25h13.5A2.25 2.25 0 0121 7.5v11.25m-18 0A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75m-18 0v-7.5A2.25 2.25 0 015.25 9h13.5A2.25 2.25 0 0121 11.25v7.5" />
            </svg>
          </div>
          <div class="iframe-header-text">
            <h3>Personal Scheduler</h3>
            <p>Manage your schedule</p>
          </div>
        </div>
        <iframe
          src="https://builder.twin.so/interface/019de6a5-b6ef-73a2-bcd4-6765f02eb829"
          width="100%"
          height="800"
          frameborder="0"
          style="border: none; border-radius: 8px;"
          title="Personal Scheduler"
        ></iframe>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer>
    <p>&copy; 2026 FJT-TECH. All rights reserved.</p>
  </footer>

</body>
</html>
